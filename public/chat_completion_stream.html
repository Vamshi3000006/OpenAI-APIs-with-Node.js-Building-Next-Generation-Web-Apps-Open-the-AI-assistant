document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('promptForm');
    const promptInput = document.getElementById('prompt');
    const outputDiv = document.getElementById('output');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async function(event) {
        event.preventDefault();

        const promptText = promptInput.value;

        outputDiv.textContent = '';
        promptInput.disabled = true;
        submitBtn.disabled = true;

        try {
            await fetchData(promptText);
        } catch (error) {
            console.error('Error:', error);
            outputDiv.textContent = 'Sorry, an error occurred. Please try again later.';
        } finally {
            promptInput.disabled = false;
            submitBtn.disabled = false;
        }
    });

    async function fetchData(promptText) {
        const encodedPrompt = encodeURIComponent(promptText);

        const response = await fetch(
            `http://localhost:4000/openai/intro/chatcompletion_stream?prompt=${encodedPrompt}`
        );

        if (!response.ok) {
            throw new Error(`HTTP error! Status: ${response.status}`);
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
            const { done, value } = await reader.read();

            if (done) break;

            const chunk = decoder.decode(value);
            outputDiv.textContent += chunk;
        }
    }
});
</script>
